name: Build SmartLift APK

# This workflow runs automatically whenever you push code to the main
# branch, and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # GitHub provides this Linux machine for free — Buildozer needs Linux,
    # so this is what makes APK building possible without WSL or a Linux PC.
    runs-on: ubuntu-22.04

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies Buildozer needs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev build-essential

      - name: Install Buildozer and Cython
        run: |
          python3 -m pip install --upgrade pip
          pip install buildozer cython==0.29.36
      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfeb131a59bf3e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
      - name: Build the APK
        run: |
          buildozer android debug
      - name: Upload the APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlift-apk
          path: bin/*.apk
